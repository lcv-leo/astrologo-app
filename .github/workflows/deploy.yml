name: Deploy Oraculo Monorepo

on:
  push:
    branches: [ "production" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./astrologo-frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./astrologo-frontend
        run: npm run build

      - name: Deploy Frontend to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: oraculo-app
          directory: ./astrologo-frontend/dist
          workingDirectory: ./astrologo-frontend
          branch: production

      - name: Install Admin Dependencies
        working-directory: ./astrologo-admin
        run: npm install

      - name: Build Admin
        working-directory: ./astrologo-admin
        run: npm run build

      - name: Deploy Admin to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: astrologo-admin
          directory: ./astrologo-admin/dist
          workingDirectory: ./astrologo-admin
          branch: production