# Módulo: .github/workflows/deploy.yml
# Versão: v1.2.0
# Descrição: Automação CI/CD. Solução definitiva para a depreciação do Node 20. Atualização direta dos módulos actions/checkout e actions/setup-node para a versão v5 (suporte nativo ao Node.js 24). Remoção de variáveis de ambiente obsoletas.

name: Deploy Pipeline Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Instalar Dependências, Compilar e Publicar
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=astrologo-app --branch production