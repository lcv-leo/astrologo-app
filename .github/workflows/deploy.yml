# Módulo: .github/workflows/deploy.yml
# Versão: v1.1.0
# Descrição: Automação CI/CD. Realocação da variável FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 para o escopo do Job, garantindo a supressão do aviso de depreciação do Node 20 pelos runners do GitHub.

name: Deploy Pipeline Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    # Injeção no escopo do Job para sobrescrever o ambiente do runner instantaneamente
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Instalar Dependências, Compilar e Publicar
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install
          npm run build
          npx wrangler pages deploy ./dist --project-name=astrologo-app --branch production