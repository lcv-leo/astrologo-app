name: Deploy Oráculo Monorepo

on:
  push:
    branches: [ "production" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm ci --prefix ./astrologo-frontend
          npm ci --prefix ./astrologo-admin

      - name: Build Projects
        run: |
          npm run build --prefix ./astrologo-frontend
          npm run build --prefix ./astrologo-admin

      - name: Stage API for Deployment
        run: |
          mkdir -p api_deploy
          echo "API" > api_deploy/index.html
          cp -r functions api_deploy/

      - name: Deploy Frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astrologo-frontend/dist --project-name="mapa-astral-lcv-app-br" --branch="production"

      - name: Deploy Admin
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astrologo-admin/dist --project-name="astrologo-admin-lcv-app-br" --branch="production"

      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy api_deploy --project-name="oraculo-api" --branch="production"