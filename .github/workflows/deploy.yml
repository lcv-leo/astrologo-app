name: Deploy Oráculo Monorepo

on:
  push:
    branches: [ "production" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./astrologo-frontend
        run: npm install

      - name: Install Admin Dependencies
        working-directory: ./astrologo-admin
        run: npm install

      - name: Sincronizar o Backend (Functions) com os Módulos
        run: |
          cp -r functions astrologo-frontend/
          cp -r functions astrologo-admin/

      - name: Build Frontend Público
        working-directory: ./astrologo-frontend
        run: npm run build

      - name: Build Câmara Admin
        working-directory: ./astrologo-admin
        run: npm run build

      - name: Deploy Frontend (Cloudflare Pages)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: astrologo-frontend
          directory: dist
          workingDirectory: astrologo-frontend
          branch: production

      - name: Deploy Admin (Cloudflare Pages)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: astrologo-admin
          directory: dist
          workingDirectory: astrologo-admin
          branch: production