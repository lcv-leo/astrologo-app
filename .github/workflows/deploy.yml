# Módulo: .github/workflows/deploy-astrologo.yml
# Versão: v1.1.0
# Descrição: Deploy unificado do Frontend e Admin do Astrologo Monorepo em job único com cache otimizado.

name: Deploy Astrologo Monorepo

on:
  push:
    branches: [ "main" ] # Gatilho de escuta no GitHub (Padrão GitHub)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 : 'true'
  NODE_OPTIONS: "--no-deprecation"
  WRANGLER_VERSION: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js (Latest LTS) com Cache Monorepo
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24' # Força o uso do Node.js moderno e limpo
          cache: 'npm'
          cache-dependency-path: |
            ./astrologo-frontend/package-lock.json
            ./astrologo-admin/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./astrologo-frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./astrologo-frontend
        run: npm run build

      - name: Deploy Frontend via Wrangler CLI Latest
        working-directory: ./astrologo-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Chama diretamente a CLI mais moderna, enviando para a branch 'production' da Cloudflare
        run: npx wrangler@${WRANGLER_VERSION} pages deploy dist --project-name astrologo-frontend --branch production --commit-dirty=true

      - name: Install Admin Dependencies
        working-directory: ./astrologo-admin
        run: npm install

      - name: Build Admin
        working-directory: ./astrologo-admin
        run: npm run build

      - name: Deploy Admin via Wrangler CLI Latest
        working-directory: ./astrologo-admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Chama diretamente a CLI mais moderna, enviando para a branch 'production' da Cloudflare.
        run: npx wrangler@${WRANGLER_VERSION} pages deploy dist --project-name astrologo-admin --branch production --commit-dirty=true