# Módulo: .github/dependabot.yml (v2.0.0)
version: 2
updates:
  # ---------------------------------------------------------
  # 1. INFRAESTRUTURA: Esteiras de CI/CD (GitHub Actions)
  # ---------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "ci-cd"
      - "github-actions"
      - "security"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5

  # ---------------------------------------------------------
  # 2. SOFTWARE: astrologo-frontend (NPM)
  # ---------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/astrologo-frontend"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "chore"
      include: "scope"
    versioning-strategy: increase
    groups:
      dev-dependencies:
        patterns:
          - "eslint*"
          - "vite*"
          - "typescript"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
