<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Astrology Favicon: Stylized zodiac/celestial symbol -->
  <!-- Outer circle (celestial sphere) -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- Cross lines (celestial axes) -->
  <line x1="16" y1="3" x2="16" y2="29" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  <line x1="3" y1="16" x2="29" y2="16" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#4f46e5" stroke-width="1.2"/>
  <!-- Star at center -->
  <polygon points="16,9 17.5,13.5 22,13.5 18.5,16.5 20,21 16,18 12,21 13.5,16.5 10,13.5 14.5,13.5" fill="#4f46e5" opacity="0.9"/>
  <!-- Small stars -->
  <circle cx="8" cy="8" r="1" fill="#4f46e5" opacity="0.6"/>
  <circle cx="25" cy="7" r="0.8" fill="#4f46e5" opacity="0.4"/>
  <circle cx="24" cy="24" r="0.7" fill="#4f46e5" opacity="0.5"/>
  <circle cx="6" cy="23" r="0.9" fill="#4f46e5" opacity="0.3"/>
</svg>